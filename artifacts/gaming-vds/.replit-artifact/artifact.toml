kind = "web"
previewPath = "/"
title = "Oyun VDS - Gaming VDS Hizmeti"
version = "1.0.0"
id = "artifacts/gaming-vds"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22501

[services.development]
run = "pnpm --filter @workspace/gaming-vds run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/gaming-vds", "run", "build" ]
publicDir = "artifacts/gaming-vds/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22501"
BASE_PATH = "/"
