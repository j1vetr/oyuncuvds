openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Gaming VDS API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: payment
    description: Payment operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /create-payment:
    post:
      operationId: createPayment
      tags: [payment]
      summary: Create a PayTR payment session
      description: Receives order details and returns a PayTR payment token or placeholder URL
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderInput"
      responses:
        "200":
          description: Payment session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentResult"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    OrderInput:
      type: object
      required:
        - packageName
        - billingPeriod
        - basePrice
        - kdv
        - totalPrice
        - customerName
        - whatsapp
        - email
        - usagePurpose
      properties:
        packageName:
          type: string
          description: Name of the selected VDS package
        billingPeriod:
          type: string
          enum: [aylik, yillik]
          description: Billing period (monthly or yearly)
        basePrice:
          type: number
          description: Base price before KDV (TL)
        kdv:
          type: number
          description: KDV amount (TL)
        totalPrice:
          type: number
          description: Total price including KDV (TL)
        customerName:
          type: string
          description: Customer full name
        whatsapp:
          type: string
          description: Customer WhatsApp number
        email:
          type: string
          description: Customer email address
        usagePurpose:
          type: string
          description: Intended usage (e.g. Knight Online, Metin2, Silkroad, Diger)
        note:
          type: ["string", "null"]
          description: Optional additional notes
    PaymentResult:
      type: object
      required:
        - success
        - paymentUrl
        - mode
      properties:
        success:
          type: boolean
        paymentUrl:
          type: string
          description: PayTR iframe URL or placeholder URL
        mode:
          type: string
          enum: [live, placeholder]
          description: Whether real PayTR or placeholder mode
        message:
          type: ["string", "null"]
          description: Optional message to display
    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
